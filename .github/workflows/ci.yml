name: Security CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-extended,security-and-quality

      - name: Build
        run: |
          dotnet restore VulnerableApi.sln
          dotnet build VulnerableApi.sln --configuration Release --no-restore

      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
          output: codeql-results
          upload: always

      - name: Save raw SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results
          retention-days: 30

      - name: Setup Python
        if: always()
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate one-page HTML report
        if: always()
        run: |
          mkdir -p reports
          python3 .github/scripts/sarif_to_report.py codeql-results reports/security-report.html

      # Convert the HTML to a single-page PDF using headless Chrome.
      - name: Convert HTML to PDF
        if: always()
        run: |
          # Chromium ships with the ubuntu-latest runner image
          google-chrome --headless --disable-gpu --no-sandbox \
            --print-to-pdf=reports/security-report.pdf \
            --print-to-pdf-no-header \
            "file://$(pwd)/reports/security-report.html" || \
          chromium-browser --headless --disable-gpu --no-sandbox \
            --print-to-pdf=reports/security-report.pdf \
            --print-to-pdf-no-header \
            "file://$(pwd)/reports/security-report.html" || true
          ls -lh reports

      - name: Upload human-readable report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports
          retention-days: 30

