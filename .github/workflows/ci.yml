name: Security CI (demo)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

# ----------------------------------------------------------------------------
# This workflow demonstrates the unified-report pipeline for the real CI:
#
#   1. dependency-codeql  → CodeQL "dependency-vulnerability:csharp" SARIF
#   2. sast-codeql        → CodeQL "sast:csharp"                      SARIF
#   3. trivy              → Trivy filesystem scan                     SARIF
#   4. gitleaks           → Gitleaks (Docker, JSON output)            JSON
#   5. report             → Downloads every artifact, runs the Python
#                           script, produces ONE PDF + HTML grouped by
#                           vulnerability category across all scanners.
#
# Each scanner job mirrors the composite-action shape from your real
# pipeline. Swap the `runs-on: ubuntu-latest` for `windows-latest` and
# the `uses:` lines for your composite actions in production.
# ----------------------------------------------------------------------------

jobs:
  # --- 1. CodeQL: dependency vulnerabilities -------------------------------
  dependency-codeql:
    name: CodeQL — dependency vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: manual

      - name: Build
        run: |
          dotnet restore VulnerableApi.sln
          dotnet build VulnerableApi.sln --configuration Release --no-restore

      - name: CodeQL analyze (dependency)
        uses: github/codeql-action/analyze@v3
        with:
          category: "dependency-vulnerability:csharp"
          output: dependency-results
          upload: false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-codeql-report
          path: dependency-results
          retention-days: 7

  # --- 2. CodeQL: SAST -----------------------------------------------------
  sast-codeql:
    name: CodeQL — SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-extended,security-and-quality
          build-mode: manual

      - name: Build
        run: |
          dotnet restore VulnerableApi.sln
          dotnet build VulnerableApi.sln --configuration Release --no-restore

      - name: CodeQL analyze (SAST)
        uses: github/codeql-action/analyze@v3
        with:
          category: "sast:csharp"
          output: sast-results
          upload: false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-codeql-report
          path: sast-results
          retention-days: 7

  # --- 3. Trivy: filesystem (SCA + secrets + IaC) --------------------------
  trivy:
    name: Trivy — filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Trivy reads NuGet vulns from the lockfile that `dotnet restore` produces.
      # Without restoring first, transitive CVEs are invisible.
      - name: Restore (so Trivy sees the lockfile)
        run: dotnet restore VulnerableApi.sln --use-lock-file --force-evaluate

      - name: Trivy fs scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH,MEDIUM,LOW
          # Tell Trivy which scanners to enable: vuln (CVEs) + secret + misconfig
          scanners: vuln,secret,misconfig
          exit-code: "0"

      - name: Show Trivy result count
        run: |
          jq '[.runs[].results[]?] | length' trivy.sarif

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy.sarif
          retention-days: 7

  # --- 4. Gitleaks (matches your composite action: JSON output) ------------
  gitleaks:
    name: Gitleaks — secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full git history so Gitleaks can scan past commits

      - name: Run Gitleaks (Docker, JSON)
        continue-on-error: true
        run: |
          # --no-git=false → scan the actual git history, not just the working tree.
          # --redact=0 → keep matches in the report.
          # --log-level=info → so the runner log shows what it's doing.
          docker run --rm \
            -v "${{ github.workspace }}:/target" \
            zricethezav/gitleaks:latest detect \
              --source=/target \
              --log-level=info \
              --redact=0 \
              --report-format=json \
              --report-path=/target/gitleaks-report.json || true
          # Always leave a valid JSON file behind so the report job can parse it
          [[ -f gitleaks-report.json ]] || echo "[]" > gitleaks-report.json
          echo "Gitleaks output preview:"
          head -c 1000 gitleaks-report.json
          echo
          echo "Findings count: $(jq 'length' gitleaks-report.json)"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 7

  # --- 5. Unified report ---------------------------------------------------
  report:
    name: Unified security report
    if: always()
    needs: [dependency-codeql, sast-codeql, trivy, gitleaks]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: scans
          pattern: '*-report'
          merge-multiple: false

      - name: Inspect what we got
        run: |
          echo "================================================"
          echo "Files downloaded into scans/"
          echo "================================================"
          find scans -type f -exec ls -lh {} \;
          echo
          echo "================================================"
          echo "Quick content peek per file"
          echo "================================================"
          for f in $(find scans -type f); do
            echo
            echo "--- $f ---"
            if [[ "$f" == *.sarif ]]; then
              # Count results across all runs
              results=$(jq '[.runs[].results[]?] | length' "$f" 2>/dev/null || echo "?")
              tool=$(jq -r '.runs[0].tool.driver.name // "unknown"' "$f" 2>/dev/null)
              echo "tool=$tool   results=$results"
            elif [[ "$f" == *gitleaks*.json ]]; then
              count=$(jq 'length' "$f" 2>/dev/null || echo "?")
              echo "gitleaks_findings=$count"
            else
              echo "(non-sarif file, size $(wc -c < "$f") bytes)"
            fi
          done
          echo "================================================"
        # jq is preinstalled on ubuntu runners

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate unified HTML report
        run: |
          mkdir -p reports
          # Run the script and tee its diagnostic output so it shows up in the run log
          python3 .github/scripts/sarif_to_report.py \
            scans \
            reports/security-report.html \
            | tee reports/script-output.txt
          echo
          echo "Tools that contributed to the report:"
          grep -oE '\[[A-Za-z]+ *\] [A-Za-z]+' reports/script-output.txt | awk '{print $2}' | sort -u || true

      - name: Convert HTML to PDF (headless Chrome)
        run: |
          google-chrome --headless --disable-gpu --no-sandbox \
            --print-to-pdf=reports/security-report.pdf \
            --print-to-pdf-no-header \
            "file://$(pwd)/reports/security-report.html"

      - name: Upload final PDF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/security-report.pdf
          retention-days: 30

      # - name: Add summary to run page
