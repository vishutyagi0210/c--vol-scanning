name: Security CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write   # for the PR comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-extended,security-and-quality

      - name: Build
        run: |
          dotnet restore VulnerableApi.sln
          dotnet build VulnerableApi.sln --configuration Release --no-restore

      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
          output: codeql-results
          upload: always

      - name: Save raw SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results
          retention-days: 30

      # -----------------------------------------------------------------------
      # Human-readable report via Microsoft's sarif-tools.
      #
      # https://github.com/microsoft/sarif-tools
      # Generates: summary.txt, report.html, findings.csv
      # -----------------------------------------------------------------------
      - name: Setup Python
        if: always()
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sarif-tools
        if: always()
        run: pip install --quiet sarif-tools

      - name: Generate human-readable reports
        if: always()
        run: |
          mkdir -p reports
          sarif summary -o reports/summary.txt codeql-results || true
          sarif html    -o reports/report.html  codeql-results || true
          sarif csv     -o reports/findings.csv codeql-results || true
          ls -lh reports

