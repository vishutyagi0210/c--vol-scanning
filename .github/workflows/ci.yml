name: Security CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-extended,security-and-quality

      - name: Build
        run: |
          dotnet restore VulnerableApi.sln
          dotnet build VulnerableApi.sln --configuration Release --no-restore

      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
          output: codeql-results
          upload: always

      - name: Save raw SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results
          retention-days: 30

      # -----------------------------------------------------------------------
      # Polished PDF report — uses HTML templates + headless Chrome
      # https://github.com/rsdmike/github-security-report-action
      # -----------------------------------------------------------------------
      - name: Generate PDF security report
        if: always()
        uses: rsdmike/github-security-report-action@v3.0.4
        with:
          token: ${{ secrets.GIT_TOKEN }}
          sarifReportDir: codeql-results
          outputDir: reports
          template: report

      - name: Upload PDF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-pdf-report
          path: reports/*.pdf
          if-no-files-found: warn
          retention-days: 30

      - name: Write summary to workflow run page
        if: always()
        run: |
          {
            echo "# 🛡️ CodeQL Security Scan"
            echo ""
            echo "**Repository:** \`${{ github.repository }}\`  "
            echo "**Branch / commit:** \`${{ github.ref_name }}\` @ \`${{ github.sha }}\`  "
            echo "**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "## 📄 Reports"
            echo ""
            echo "A polished PDF report has been generated for this run."
            echo ""
            echo "**Download it:** scroll down to the **Artifacts** section and grab \`codeql-pdf-report\`."
            echo ""
            echo "Other places to view findings:"
            echo "- **Security → Code scanning** tab — every alert with file/line context and remediation guidance"
            echo "- \`codeql-sarif\` artifact — raw SARIF (for tooling)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: codeql-summary
          message: |
            ## 🛡️ CodeQL Security Scan

            A polished PDF report has been generated for this pull request.

            **➡ Download** the `codeql-pdf-report` artifact from the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            Findings are also visible in the **Security → Code scanning** tab.
